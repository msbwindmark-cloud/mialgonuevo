{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestión Ozaz</title>
    <link rel="icon" type="image/png" href="{% static 'favicon.png' %}">
    <!-- Bootswatch Theme: Zephyr -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootswatch/5.3.3/zephyr/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="card login-card border-0">
    <div class="card-body p-5">
        <h3 class="text-center mb-4 text-primary fw-bold">Gestión Ozaz</h3>
        
        {% if form.errors %}
        <div class="alert alert-danger">
            Usuario o contraseña incorrectos. Por favor intenta de nuevo.
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            
            <div class="mb-4">
                <button type="button" id="btn-voice-login" class="btn btn-outline-primary btn-sm mb-2 w-100">
                    <i class="bi bi-mic-fill"></i> Usar Voz (Ej: admin punto 1234)
                </button>
                <div id="voice-transcript-preview" class="text-muted small mt-1 text-center" style="display:none; font-style: italic; max-height: 60px; overflow-y: auto; border: 1px dashed #0d6efd; padding: 6px; border-radius: 6px; background-color: #f8f9fa;"></div>
            </div>

            <div class="form-floating mb-3 position-relative">
                <input type="text" class="form-control" id="floatingInput" name="username" placeholder="Usuario" required autofocus>
                <label for="floatingInput">Nombre de usuario</label>
            </div>
            <div class="form-floating mb-4 position-relative">
                <input type="password" class="form-control pe-5" id="floatingPassword" name="password" placeholder="Contraseña" required>
                <label for="floatingPassword">Contraseña</label>
                
                <button type="button" id="togglePassword" class="btn border-0 position-absolute end-0 top-50 translate-middle-y me-2 z-3 text-muted" style="background: none;">
                    <i class="bi bi-eye-fill fs-5" id="eyeIcon"></i>
                </button>
            </div>
            <button class="btn btn-primary w-100 py-2 mb-3 rounded-pill" type="submit" id="btn-login">Entrar al Sistema</button>

            <div class="text-center mt-3" hidden>
                <span class="text-muted small">¿No tienes usuario?</span> 
                <a href="{% url 'registro' %}" class="small text-decoration-none fw-bold">Regístrate aquí</a>
            </div>
            
            <input type="hidden" name="next" value="{{ next }}">
        </form>
    </div>
</div>

<script src="{% static 'voice_offline.js' %}"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#floatingPassword');
        const eyeIcon = document.querySelector('#eyeIcon');

        // Voice Control Initialization
        const voiceLogin = initializeVoiceControl({ type: 'login', fields: { user: 'floatingInput', pass: 'floatingPassword' } });

        if (voiceLogin) {
            document.getElementById('btn-voice-login').onclick = () => {
                if (voiceLogin.running) {
                    voiceLogin.stop();
                } else {
                    voiceLogin.start();
                }
            };
        }

        const loginForm = document.querySelector('form');
        loginForm.addEventListener('submit', async function (e) {
            const username = document.getElementById('floatingInput').value;
            const password = document.getElementById('floatingPassword').value;

            if (!navigator.onLine) {
                e.preventDefault();
                const isValid = await checkOfflineLogin(username, password);
                if (isValid) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Modo Offline',
                        text: 'Login local exitoso. Redirigiendo...',
                        timer: 2000,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = "{% url 'dashboard' %}";
                    });
                } else {
                    Swal.fire('Error', 'Credenciales offline no encontradas o incorrectas.', 'error');
                }
            } else {
                // Online: Guardar para futuro uso offline al hacer login exitoso
                // Nota: Idealmente esto se haría después de que el servidor confirme el login.
                // Como es una demo, guardamos el hash al intentar si estamos online.
                saveUserForOffline(username, btoa(password));
            }
        });
    });
</script>
</body>
</html>
